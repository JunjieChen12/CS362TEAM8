{% extends "base.html" %}

{% block title %}Focus Session - {{ task.name }}{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6 text-center">
        <div class="mb-4">
            <span class="badge btn-focus-primary rounded-pill px-3 py-2 mb-2">FOCUSING ON</span>
            <h1 class="display-5 fw-bold">{{ task.name }}</h1>
        </div>

        <div class="timer-display mb-5">
            <h2 id="countdown" class="display-1 fw-bold font-monospace" style="font-size: 8rem;">
                {{ duration }}:00
            </h2>
            <div id="postSessionMessage" class="h4 text-success fw-bold d-none">Time's up! Great work.</div>
        </div>

        <div id="activeControls" class="d-flex justify-content-center gap-3">
            <button id="startBtn" class="btn btn-focus-primary btn-lg px-5 rounded-pill shadow-sm">Start</button>
            <button id="pauseBtn" class="btn btn-outline-focus btn-lg px-5 rounded-pill" disabled>Pause</button>
        </div>

        <div id="postControls" class="d-none mt-4 animate-in">
            <div class="d-flex flex-column gap-3 align-items-center">
                <p class="text-muted fw-medium">Session complete. Need more time?</p>
                <div class="d-flex gap-3">
                    <button id="addTimeBtn" class="btn btn-outline-focus rounded-pill px-4">Add 5 Minutes</button>
                    <a href="/toggle/{{ task.id }}" class="btn btn-focus-success rounded-pill px-5 fw-bold shadow-sm">
                        <i class="bi bi-check-lg me-2"></i>Complete Task
                    </a>
                </div>
            </div>
        </div>

        <div class="mt-5">
            <a href="/" class="btn btn-link text-decoration-none text-muted">Quit Session</a>
        </div>
    </div>
</div>

<script>
    let timeLeft = Number("{{ duration }}") * 60 || 25 * 60;
    let timerId = null;
    
    const display = document.getElementById('countdown');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const activeControls = document.getElementById('activeControls');
    const postControls = document.getElementById('postControls');
    const postMessage = document.getElementById('postSessionMessage');
    const addTimeBtn = document.getElementById('addTimeBtn');

    function updateDisplay() {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        display.textContent = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
    }

    function startTimer() {
        if (timerId) return;
        startBtn.disabled = true;
        pauseBtn.disabled = false;
        startBtn.textContent = "Running...";

        timerId = setInterval(() => {
            if (timeLeft <= 0) {
                endSession();
                return;
            }
            timeLeft--;
            updateDisplay();
        }, 1000);
    }

    function pauseTimer() {
        clearInterval(timerId);
        timerId = null;
        startBtn.disabled = false;
        pauseBtn.disabled = true;
        startBtn.textContent = "Resume";
    }

    function endSession() {
        clearInterval(timerId);
        timerId = null;
        
        display.classList.add('text-muted');
        activeControls.classList.add('d-none');
        postControls.classList.remove('d-none');
        postMessage.classList.remove('d-none');
        
    }

    addTimeBtn.addEventListener('click', () => {
        timeLeft = 5 * 60; // Add 5 minutes
        updateDisplay();
        
        // Reset UI
        display.classList.remove('text-muted');
        activeControls.classList.remove('d-none');
        postControls.classList.add('d-none');
        postMessage.classList.add('d-none');
        startBtn.textContent = "Start";
        startBtn.disabled = false;
    });

    startBtn.addEventListener('click', startTimer);
    pauseBtn.addEventListener('click', pauseTimer);
    updateDisplay();
</script>
{% endblock %}
